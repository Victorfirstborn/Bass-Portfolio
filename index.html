<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victor's Bass Guitar Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
      color: #2c3e50;
    }

    header {
      background-color: #3498db;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background-color: #2980b9;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    header button:hover {
      background-color: #1c5980;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 15px 0;
      flex-wrap: wrap;
    }

    nav button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background-color: #2980b9;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    nav button:hover {
      background-color: #1c5980;
    }

    section {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .bass-card {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      width: 300px;
      padding: 15px;
      transition: transform 0.2s;
    }

    .bass-card:hover {
      transform: translateY(-5px);
    }

    .bass-card iframe {
      width: 100%;
      height: 170px;
      border-radius: 10px;
    }

    .bass-card button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      background-color: #3498db;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .bass-card button:hover {
      background-color: #2980b9;
    }

    audio {
      margin-top: 10px;
      width: 100%;
      outline: none;
    }

    @media (max-width: 600px) {
      .bass-card {
        width: 90%;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Victor's Bass Guitar Portfolio</h1>
  <p>Watch my covers, listen to my tracks, and get bass tips!</p>
  <button onclick="openPlaylist()">My Bass Playlist</button>
</header>

<nav>
  <button onclick="scrollToSection('covers')">Covers</button>
  <button onclick="scrollToSection('tips')">Tips</button>
  <button onclick="scrollToSection('audio')">Audio</button>
</nav>

<section id="covers">
  <h2>My Bass Covers</h2>
  <div class="gallery">
    <div class="bass-card">
      <iframe src="https://www.youtube.com/embed/pm4gBK0qqZ4" allowfullscreen></iframe>
      <button onclick="alert('Keep practicing!')">Bass Tip</button>
    </div>
    <div class="bass-card">
      <iframe src="https://www.youtube.com/embed/JTGwbIrM1ds" allowfullscreen></iframe>
      <button onclick="alert('Play by ear and stay consistent!')">Bass Tip</button>
    </div>
    <div class="bass-card">
  <iframe src="https://www.youtube.com/embed/xY-amkK15DA" allowfullscreen></iframe>
  <button onclick="alert('Keep practicing!')">Bass Tip</button>
</div>
  </div>
</section>

<section id="audio">
  <h2>My Bass Tracks</h2>
  <div class="gallery">
    <div class="bass-card">
      <p>Track 1</p>
      <audio controls>
        <source src="bass2.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>
    <div class="bass-card">
      <p>Track 2</p>
      <audio controls>
        <source src="bass1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>
  </div>
</section>

<section id="tips">
  <h2>Bass Tips</h2>
  <div style="text-align:center;">
    <button onclick="showMessage()">Click for Bass Tip of the Day</button>
  </div>
</section>

<script>
  function openPlaylist() {
    window.open("https://www.youtube.com/playlist?list=PLKSyztudmoTvnGbxIL1g3lY8ufalF_kSG", "_blank");
  }

  function showMessage() {
    alert("Practice daily, play by ear, and always stay consistent!");
  }

  function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({behavior: "smooth"});
  }
</script>

</body>
</html>
